services:
  decree:
    image: ghcr.io/jtmckay/decree:latest
    volumes:
      - .:/work
      - ~/shared-routines:/routines # optional: shared routines
    environment:
      - DECREE_AI=opencode # opencode, claude, or copilot
      - DECREE_DAEMON=true
      - DECREE_INTERVAL=2
      - DECREE_CONTAINER=decree_1
    restart: unless-stopped
