commands:
  ai_router: claude -p {prompt}
  ai_interactive: claude
max_retries: 3
max_depth: 10
max_log_size: 2097152
default_routine: develop
routine_source: "~/.decree/routines" # optional, shared routines directory
hooks:
  beforeAll: ''
  afterAll: ''
  beforeEach: ''
  afterEach: ''
routines:
  develop:
    enabled: true
  raw:
    enabled: true
  rust-develop:
    enabled: true
